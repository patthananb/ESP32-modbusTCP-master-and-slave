; PlatformIO project for esp32MODBUSTCP
;
; Build the slave:   pio run -e esp32s3_tcp_slave -t upload
; Build the master:  pio run -e esp32c6_tcp_master -t upload
;
; Each environment points at its own .ino sketch as a source dir.

[env]
framework = arduino
monitor_speed = 115200
lib_deps =
    emelianov/modbus-esp8266@^4.1.0

[env:esp32s3_tcp_slave]
platform = espressif32
board = esp32-s3-devkitc-1
build_flags = -DARDUINO_USB_CDC_ON_BOOT=1
src_dir = esp32s3_tcp_slave

[env:esp32c6_tcp_master]
platform = espressif32
board = esp32-c6-devkitc-1
build_flags = -DARDUINO_USB_CDC_ON_BOOT=1
src_dir = esp32c6_tcp_master
